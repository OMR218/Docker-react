name: Build and Test
on:
  push:
    branches:
      - master

jops:
  build:
    run-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t OMR21/docker-react -f Dockerfile.dev .
      - run: docker run -e CI=true OMR21/docker-react npm run test